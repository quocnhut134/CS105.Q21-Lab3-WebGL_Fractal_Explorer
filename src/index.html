<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fractal - CS105.Q21</title>
    <style>
        body { margin: 0; padding: 0; display: flex; font-family: sans-serif; background-color: #1e1e1e; color: white; height: 100vh; overflow: hidden; }
        #sidebar { width: 250px; background-color: #2d2d2d; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 10; }
        #canvascontainer { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h2 { font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        button { width: 100%; padding: 10px; margin-bottom: 10px; background-color: #007acc; color: white; border: none; cursor: pointer; border-radius: 4px; transition: background 0.3s; }
        button:hover { background-color: #005999; }
        .controls { margin-top: 20px; }
        input[type=range] { width: 100%; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Fractal Menu</h2>
        <button id="btnkoch">Koch Snowflake</button>
        <button id="btnminkowski">Minkowski Island</button>
        <button id="btnsierpinskitri">Sierpinski Triangle</button>
        <button id="btnsierpinskicar">Sierpinski Carpet</button>
        <button id="btnmandelbrot">Mandelbrot Set</button>
        <button id="btnjulia">Julia Set</button>
        
        <div class="controls" id="paramcontrols" style="display:none;">
            <label>Zoom / Iteration: <span id="paramval"></span></label>
            <input type="range" id="paraminput" min="1" max="100" value="1">
        </div>
    </div>
    <div id="canvascontainer">
        <canvas id="glcanvas" width="700" height="700"></canvas>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
